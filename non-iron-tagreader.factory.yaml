# These substitutions allow the end user to override certain values
substitutions:
  name: "non-iron-tagreader"
  friendly_name: "Non-Iron TagReader"

packages:
  # Include all of the core configuration
  core: !include non-iron-tagreader-atom-lite.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  # Automatically add the mac address to the name
  # so you can use a single firmware for all devices
  name_add_mac_suffix: true

  project:
    name: LukaGra.${friendly_name}
    version: dev

ota:
  - platform: http_request
    id: ota_http_request

http_request:

update:
  - platform: http_request
    name: None
    id: update_http_request
    source: https://luka6000.github.io/non-iron-tagreader/firmware/non-iron-tagreader-firmware.manifest.json

# This should point to the public location of this yaml file.
dashboard_import:
  package_import_url: github://luka6000/non-iron-tagreader/non-iron-tagreader.factory.yaml@main
  import_full_config: false

# Sets up the improv via serial client for Wi-Fi provisioning
# improv_serial:
#   next_url: https://github.com/luka6000/Non-Iron-TagReader
  
esp32_ble:
  name: nonIronTagRdr
esp32_improv:
  authorizer: toggle
